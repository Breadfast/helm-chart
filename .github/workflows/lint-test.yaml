name: Lint and Test Charts
on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.1

      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Lint ALL changed charts, including rudderstack.
      # --chart-repos registers the remote subchart repos so `ct`'s pre-lint
      # `helm dependency build` resolves them (oneuptime depends on keda /
      # cloudnative-pg / altinity from remote repos; without this ct fails with
      # "no repository definition"). rudderstack's dep is a local file:// chart,
      # so it never needed this.
      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: >-
          ct lint --target-branch ${{ github.event.repository.default_branch }}
          --chart-repos keda=https://kedacore.github.io/charts,cloudnative-pg=https://cloudnative-pg.github.io/charts,altinity-clickhouse-operator=https://helm.altinity.com/

  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.1

      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.8.0

      # Install-test changed charts EXCEPT rudderstack and oneuptime: both are
      # DB/Vault-backed (external Cloud SQL/Memorystore + AVP-resolved secrets)
      # and cannot reach Ready in a kind cluster. oneuptime additionally needs
      # ClickHouse + operator subcharts and external Postgres/Redis, so its app
      # never becomes Ready in kind. Both are still linted in the lint job above.
      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }} --excluded-charts rudderstack,oneuptime
