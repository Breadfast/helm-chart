{{- if $.Values.serviceAccount.create }}
# OneUptime ServiceAccount for the app and worker pods.
#
# Created only when serviceAccount.create is true (default false keeps the chart
# drop-in compatible with upstream, which sets no serviceAccountName). The
# annotations block is where the GKE Workload Identity link lives, e.g.
#   iam.gke.io/gcp-service-account: oneuptime-chat@<project>.iam.gserviceaccount.com
# so the app/worker pods can call the Google Chat API keylessly via ADC.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "oneuptime.serviceAccountName" $ }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: oneuptime
    app.kubernetes.io/managed-by: Helm
    appname: oneuptime
  {{- with $.Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
