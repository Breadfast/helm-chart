{{- $useGatewayBlock := and .Values.gateway.enabled .Values.gateway.hosts -}}
{{- $useIngressGateway := and .Values.ingress.enabled (eq .Values.ingress.type "gateway") .Values.ingress.hosts -}}
{{- if or $useGatewayBlock $useIngressGateway -}}
{{- $defaultSvcName := printf "%s-service" (include "service.fullname" .) -}}
{{- $fullName := include "service.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $parentRefs := "" -}}
{{- $hosts := list -}}
{{- $annotations := dict -}}
{{- if $useGatewayBlock -}}
  {{- $hosts = .Values.gateway.hosts -}}
  {{- $annotations = .Values.gateway.annotations | default dict -}}
  {{- if .Values.gateway.parentRefs -}}
    {{- $parentRefs = "gatewayParentRefs" -}}
  {{- else -}}
    {{- $parentRefs = "gatewaySimple" -}}
  {{- end -}}
{{- else -}}
  {{- $hosts = .Values.ingress.hosts -}}
  {{- $annotations = .Values.ingress.gateway.annotations | default dict -}}
  {{- if .Values.ingress.gateway.parentRefs -}}
    {{- $parentRefs = "ingressParentRefs" -}}
  {{- else -}}
    {{- $parentRefs = "ingressSimple" -}}
  {{- end -}}
{{- end -}}

{{- /* Collect ALL rules across all hosts into a flat list */ -}}
{{- $allRules := list -}}
{{- range $hosts -}}
  {{- $host := .host -}}
  {{- range .paths -}}
    {{- $pathType := .pathType | default "Prefix" -}}
    {{- if eq $pathType "Exact" -}}
      {{- $pathType = "Exact" -}}
    {{- else -}}
      {{- $pathType = "PathPrefix" -}}
    {{- end -}}
    {{- $rule := dict "host" $host "path" .path "pathType" $pathType "serviceName" .serviceName "servicePort" .servicePort -}}
    {{- $allRules = append $allRules $rule -}}
  {{- end -}}
{{- end -}}

{{- /* Split rules into chunks of 16 */ -}}
{{- $maxRules := 16 -}}
{{- $totalRules := len $allRules -}}
{{- $chunkCount := divf $totalRules $maxRules | ceil | int -}}
{{- if lt $chunkCount 1 -}}{{- $chunkCount = 1 -}}{{- end -}}

{{- range $chunkIdx := until $chunkCount -}}
  {{- $startIdx := mul $chunkIdx $maxRules -}}
  {{- $endIdx := min (add $startIdx $maxRules) $totalRules -}}
  {{- $chunkRules := slice $allRules $startIdx $endIdx -}}

  {{- /* Collect unique hostnames for this chunk */ -}}
  {{- $chunkHosts := list -}}
  {{- range $chunkRules -}}
    {{- if not (has .host $chunkHosts) -}}
      {{- $chunkHosts = append $chunkHosts .host -}}
    {{- end -}}
  {{- end -}}

  {{- /* Name suffix: no suffix for first chunk, -2 / -3 etc for subsequent */ -}}
  {{- $nameSuffix := "" -}}
  {{- if gt $chunkIdx 0 -}}
    {{- $nameSuffix = printf "-%d" (add $chunkIdx 1) -}}
  {{- end -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-httproute{{ $nameSuffix }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "service.labels" $ | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  {{- if eq $parentRefs "gatewayParentRefs" }}
  {{- range $.Values.gateway.parentRefs }}
  - name: {{ .name }}
    {{- if .namespace }}
    namespace: {{ .namespace }}
    {{- end }}
  {{- end }}
  {{- else if eq $parentRefs "gatewaySimple" }}
  - name: {{ $.Values.gateway.gatewayName | required "gateway.gatewayName is required when gateway.enabled is true" }}
    {{- if $.Values.gateway.gatewayNamespace }}
    namespace: {{ $.Values.gateway.gatewayNamespace }}
    {{- end }}
  {{- else if eq $parentRefs "ingressParentRefs" }}
  {{- range $.Values.ingress.gateway.parentRefs }}
  - name: {{ .name }}
    {{- if .namespace }}
    namespace: {{ .namespace }}
    {{- end }}
  {{- end }}
  {{- else }}
  - name: {{ $.Values.ingress.gateway.gatewayName | required "ingress.gateway.gatewayName is required when type is gateway" }}
    {{- if $.Values.ingress.gateway.gatewayNamespace }}
    namespace: {{ $.Values.ingress.gateway.gatewayNamespace }}
    {{- end }}
  {{- end }}
  hostnames:
    {{- range $chunkHosts }}
    - {{ . | quote }}
    {{- end }}
  rules:
    {{- range $chunkRules }}
    - matches:
      - path:
          type: {{ .pathType }}
          value: {{ .path | quote }}
      backendRefs:
      - name: {{ .serviceName | default $defaultSvcName }}
        port: {{ .servicePort | default $svcPort }}
    {{- end }}
{{- end }}
{{- end }}