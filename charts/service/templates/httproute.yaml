{{- $useGatewayBlock := and .Values.gateway.enabled .Values.gateway.hosts -}}
{{- $useIngressGateway := and .Values.ingress.enabled (eq .Values.ingress.type "gateway") .Values.ingress.hosts -}}
{{- if or $useGatewayBlock $useIngressGateway -}}
{{- $defaultSvcName := printf "%s-service" (include "service.fullname" .) -}}
{{- $fullName := include "service.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- /* When the Rollout uses the gatewayAPI trafficRouter plugin, every rule that targets the
       stable Service must also carry the canary Service backendRef (the plugin errors on any
       managed rule lacking it) and both must be weighted; the plugin owns the weights at runtime. */ -}}
{{- $gwCanary := and .Values.argorollouts.enabled (eq (.Values.argorollouts.trafficRouting | default "nginx") "gatewayAPI") -}}
{{- $canarySvcName := printf "%s-service-canary" $fullName -}}
{{- $parentRefs := "" -}}
{{- $hosts := list -}}
{{- $annotations := dict -}}
{{- $maxRules := 16 -}}
{{- if $useGatewayBlock -}}
  {{- $hosts = .Values.gateway.hosts -}}
  {{- $annotations = .Values.gateway.annotations | default dict -}}
  {{- $maxRules = int (.Values.gateway.maxRulesPerRoute | default 16) -}}
  {{- if .Values.gateway.parentRefs -}}
    {{- $parentRefs = "gatewayParentRefs" -}}
  {{- else -}}
    {{- $parentRefs = "gatewaySimple" -}}
  {{- end -}}
{{- else -}}
  {{- $hosts = .Values.ingress.hosts -}}
  {{- $annotations = .Values.ingress.gateway.annotations | default dict -}}
  {{- $maxRules = int (.Values.ingress.gateway.maxRulesPerRoute | default 16) -}}
  {{- if .Values.ingress.gateway.parentRefs -}}
    {{- $parentRefs = "ingressParentRefs" -}}
  {{- else -}}
    {{- $parentRefs = "ingressSimple" -}}
  {{- end -}}
{{- end -}}

{{- /* One bundle per hostname: { host, rules[] }; chunking is per host (independent HTTPRoute sequences). */ -}}
{{- $hostBundles := list -}}
{{- if $useGatewayBlock -}}
  {{- $gh := .Values.gateway.hosts -}}
  {{- if and $gh (gt (len $gh) 0) (kindIs "string" (index $gh 0)) -}}
    {{- $sharedPaths := .Values.gateway.paths | default list -}}
    {{- if eq (len $sharedPaths) 0 -}}{{- fail "gateway.paths is required (non-empty) when gateway.hosts is a list of hostname strings" -}}{{- end -}}
    {{- range $gh -}}
      {{- $h := . -}}
      {{- $rules := list -}}
      {{- range $sharedPaths -}}
        {{- $pathType := .pathType | default "Prefix" -}}
        {{- if eq $pathType "Exact" -}}
          {{- $pathType = "Exact" -}}
        {{- else -}}
          {{- $pathType = "PathPrefix" -}}
        {{- end -}}
        {{- $rule := dict "path" .path "pathType" $pathType "serviceName" .serviceName "servicePort" .servicePort -}}
        {{- if .filters -}}
          {{- $_ := set $rule "filters" .filters -}}
        {{- end -}}
        {{- $rules = append $rules $rule -}}
      {{- end -}}
      {{- $hostBundles = append $hostBundles (dict "host" $h "rules" $rules) -}}
    {{- end -}}
  {{- else -}}
    {{- range $hosts -}}
      {{- $rules := list -}}
      {{- range .paths -}}
        {{- $pathType := .pathType | default "Prefix" -}}
        {{- if eq $pathType "Exact" -}}
          {{- $pathType = "Exact" -}}
        {{- else -}}
          {{- $pathType = "PathPrefix" -}}
        {{- end -}}
        {{- $rule := dict "path" .path "pathType" $pathType "serviceName" .serviceName "servicePort" .servicePort -}}
        {{- if .filters -}}
          {{- $_ := set $rule "filters" .filters -}}
        {{- end -}}
        {{- $rules = append $rules $rule -}}
      {{- end -}}
      {{- $hostBundles = append $hostBundles (dict "host" .host "rules" $rules) -}}
    {{- end -}}
  {{- end -}}
{{- else if $useIngressGateway -}}
  {{- range $hosts -}}
    {{- $rules := list -}}
    {{- range .paths -}}
      {{- $pathType := .pathType | default "Prefix" -}}
      {{- if eq $pathType "Exact" -}}
        {{- $pathType = "Exact" -}}
      {{- else -}}
        {{- $pathType = "PathPrefix" -}}
      {{- end -}}
      {{- $rule := dict "path" .path "pathType" $pathType "serviceName" .serviceName "servicePort" .servicePort -}}
      {{- if .filters -}}
        {{- $_ := set $rule "filters" .filters -}}
      {{- end -}}
      {{- $rules = append $rules $rule -}}
    {{- end -}}
    {{- $hostBundles = append $hostBundles (dict "host" .host "rules" $rules) -}}
  {{- end -}}
{{- end -}}

{{- $firstHttpRouteDoc := true -}}
{{- range $hIdx, $bundle := $hostBundles -}}
  {{- $hostName := $bundle.host -}}
  {{- $rules := $bundle.rules -}}
  {{- $nRules := len $rules -}}
  {{- if gt $nRules 0 -}}
    {{- $chunkCount := div (add $nRules (sub $maxRules 1)) $maxRules -}}
    {{- range $cIdx := until (int $chunkCount) -}}
      {{- $startIdx := mul (int $cIdx) $maxRules -}}
      {{- $endIdx := min (add $startIdx $maxRules) $nRules -}}
      {{- $chunkRules := slice $rules $startIdx $endIdx -}}

      {{- if not $firstHttpRouteDoc }}

---
{{- end }}
      {{- $firstHttpRouteDoc = false -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-httproute-%d-%d" $fullName (int $hIdx) (int $cIdx) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "service.labels" $ | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  {{- if eq $parentRefs "gatewayParentRefs" }}
  {{- range $.Values.gateway.parentRefs }}
  - name: {{ .name }}
    {{- if .namespace }}
    namespace: {{ .namespace }}
    {{- end }}
  {{- end }}
  {{- else if eq $parentRefs "gatewaySimple" }}
  - name: {{ $.Values.gateway.gatewayName | required "gateway.gatewayName is required when gateway.enabled is true" }}
    {{- if $.Values.gateway.gatewayNamespace }}
    namespace: {{ $.Values.gateway.gatewayNamespace }}
    {{- end }}
  {{- else if eq $parentRefs "ingressParentRefs" }}
  {{- range $.Values.ingress.gateway.parentRefs }}
  - name: {{ .name }}
    {{- if .namespace }}
    namespace: {{ .namespace }}
    {{- end }}
  {{- end }}
  {{- else }}
  - name: {{ $.Values.ingress.gateway.gatewayName | required "ingress.gateway.gatewayName is required when type is gateway" }}
    {{- if $.Values.ingress.gateway.gatewayNamespace }}
    namespace: {{ $.Values.ingress.gateway.gatewayNamespace }}
    {{- end }}
  {{- end }}
  hostnames:
    - {{ $hostName | quote }}
  rules:
    {{- range $chunkRules }}
    - matches:
      - path:
          type: {{ .pathType }}
          value: {{ .path | quote }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $stableName := .serviceName | default $defaultSvcName }}
      {{- $port := .servicePort | default $svcPort }}
      {{- $canaryOnRule := and $gwCanary (eq $stableName $defaultSvcName) }}
      backendRefs:
      - name: {{ $stableName }}
        port: {{ $port }}
        {{- if $canaryOnRule }}
        weight: 100
        {{- end }}
      {{- if $canaryOnRule }}
      - name: {{ $canarySvcName }}
        port: {{ $port }}
        weight: 0
      {{- end }}
    {{ end }}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- end -}}
