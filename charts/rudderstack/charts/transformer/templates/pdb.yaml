{{- if .Values.pdb.enabled }}
---
# Gateway readiness hard-depends on the transformer, so keep it HA: never let a
# voluntary disruption take it below pdb.minAvailable.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "transformer.fullname" . }}
  labels:
    {{- include "transformer.labels" . | nindent 4 }}
  {{- with .Values.syncWave }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ . | quote }}
  {{- end }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "transformer.selectorLabels" . | nindent 6 }}
{{- end }}
