{{- if .Values.metricsService.enabled }}
---
# Forward-compatible transformer metrics Service. DISABLED by default: the
# rudder-transformer image's Prometheus port/path must be confirmed before this
# is wired to the control plane.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.metricsService.name }}
  labels:
    {{- include "transformer.labels" . | nindent 4 }}
  {{- with .Values.syncWave }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ . | quote }}
  {{- end }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: {{ .Values.metricsService.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "transformer.selectorLabels" . | nindent 4 }}
{{- end }}
