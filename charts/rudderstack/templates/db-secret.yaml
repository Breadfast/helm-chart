{{- if and (not .Values.backend.db.existingSecret) .Values.vault.path }}
---
# Cloud SQL JobsDB credentials. Rendered with AVP placeholders only; the ArgoCD
# Vault Plugin resolves them from Vault (vault.path) at sync time. No plaintext.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rudderstack.dbSecretName" . }}
  labels:
    {{- include "rudderstack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWaves.prereqs | quote }}
type: Opaque
stringData:
  {{ .Values.backend.db.userKey }}: "<path:{{ .Values.vault.path }}#{{ .Values.backend.db.userKey }}>"
  {{ .Values.backend.db.passwordKey }}: "<path:{{ .Values.vault.path }}#{{ .Values.backend.db.passwordKey }}>"
{{- end }}
