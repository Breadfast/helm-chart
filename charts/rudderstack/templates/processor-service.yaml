---
# Headless governing Service for the processor StatefulSet (provides the stable
# network identity required by serviceName). Not an ingestion endpoint.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "processor.fullname" . }}
  labels:
    {{- include "processor.selectorLabels" . | nindent 4 }}
    {{- include "rudderstack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWaves.processor | quote }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.backend.processor.webPort }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.backend.metricsPort }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "processor.selectorLabels" . | nindent 4 }}
