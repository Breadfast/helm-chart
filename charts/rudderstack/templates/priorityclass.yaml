{{- if .Values.priorityClass.create }}
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.priorityClass.name }}
  labels:
    {{- include "rudderstack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWaves.prereqs | quote }}
value: {{ .Values.priorityClass.value }}
globalDefault: false
description: {{ .Values.priorityClass.description | quote }}
{{- end }}
