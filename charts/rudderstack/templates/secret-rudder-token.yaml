{{- if and (not .Values.rudderWorkspaceTokenExistingSecret) .Values.vault.path }}
---
# RudderStack workspace token (CONFIG_BACKEND_TOKEN). AVP placeholder only.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rudderstack.rudderWorkspaceTokenSecretName" . }}
  labels:
    {{- include "rudderstack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWaves.prereqs | quote }}
type: Opaque
stringData:
  {{ .Values.backend.workspaceTokenKey }}: "<path:{{ .Values.vault.path }}#{{ .Values.backend.workspaceTokenKey }}>"
{{- end }}
